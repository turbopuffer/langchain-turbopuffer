---
name: CI

on:
  push:
    branches: [main]
  pull_request:

# If another push to the same PR or branch happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "true"
  UV_NO_SYNC: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: files
        uses: Ana06/get-changed-files@v2.2.0
      - id: set-matrix
        run: |
          python .github/scripts/check_diff.py ${{ steps.files.outputs.all }} >> $GITHUB_OUTPUT
    outputs:
      dirs-to-lint-py: ${{ steps.set-matrix.outputs.dirs-to-lint-py }}
      dirs-to-test-py: ${{ steps.set-matrix.outputs.dirs-to-test-py }}
      dirs-to-lint-js: ${{ steps.set-matrix.outputs.dirs-to-lint-js }}
      dirs-to-test-js: ${{ steps.set-matrix.outputs.dirs-to-test-js }}

  # Python jobs
  lint:
    name: "py lint ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-lint-py != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-lint-py) }}
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  test:
    name: "py test ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-test-py != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-test-py) }}
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  compile-integration-tests:
    name: "py compile-int ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-test-py != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-test-py) }}
    uses: ./.github/workflows/_compile_integration_test.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  integration-tests:
    name: "py int ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-test-py != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-test-py) }}
    uses: ./.github/workflows/_integration_test.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  # JavaScript jobs
  js-lint:
    name: "js lint ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-lint-js != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-lint-js) }}
    uses: ./.github/workflows/_js_lint.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  js-test:
    name: "js test ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-test-js != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-test-js) }}
    uses: ./.github/workflows/_js_test.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  js-integration-tests:
    name: "js int ${{ matrix.working-directory }}"
    needs: [ build ]
    if: ${{ needs.build.outputs.dirs-to-test-js != '[]' }}
    strategy:
      matrix:
        working-directory: ${{ fromJson(needs.build.outputs.dirs-to-test-js) }}
    uses: ./.github/workflows/_js_integration_test.yml
    with:
      working-directory: ${{ matrix.working-directory }}
    secrets: inherit

  ci_success:
    name: "CI Success"
    needs: [build, lint, test, compile-integration-tests, integration-tests, js-lint, js-test, js-integration-tests]
    if: |
      always()
    runs-on: ubuntu-latest
    env:
      JOBS_JSON: ${{ toJSON(needs) }}
      RESULTS_JSON: ${{ toJSON(needs.*.result) }}
      EXIT_CODE: ${{!contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && '0' || '1'}}
    steps:
      - name: "CI Success"
        run: |
          echo $JOBS_JSON
          echo $RESULTS_JSON
          echo "Exiting with $EXIT_CODE"
          exit $EXIT_CODE
